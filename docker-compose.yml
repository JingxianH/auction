version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=auctiondb
      - DB_PASSWORD=postgres
      - DB_PORT=5432
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    command: node worker.js
    environment:
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=auctiondb
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=auctiondb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auctiondb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
