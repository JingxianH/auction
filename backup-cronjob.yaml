apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
spec:
  schedule: "0 0 * * *" 
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: alpine:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Installing tools..."
              apk add --no-cache postgresql-client aws-cli
              
              export AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY
              export AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_KEY
              TIMESTAMP=$(date +%Y%m%d%H%M%S)
              FILE_NAME="auctiondb-$TIMESTAMP.sql"
              
              echo "Starting database dump..."
              PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h postgres-0.postgres.default.svc.cluster.local -U $POSTGRES_USER -d $POSTGRES_DB > /tmp/$FILE_NAME
              
              echo "Uploading to DigitalOcean Spaces..."
              aws s3 cp /tmp/$FILE_NAME s3://$SPACE_NAME/$FILE_NAME --endpoint-url https://tor1.digitaloceanspaces.com
              
              echo "Backup completed successfully!"
            env:
            - name: SPACES_ACCESS_KEY
              valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACES_ACCESS_KEY } }
            - name: SPACES_SECRET_KEY
              valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACES_SECRET_KEY } }
            - name: SPACE_NAME
              valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACE_NAME } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_DB } }
          restartPolicy: OnFailure
