name: Build and Deploy to DigitalOcean Kubernetes

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/auction-api:latest

      - name: Install DigitalOcean CLI (doctl)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Save DigitalOcean Kubeconfig
        run: doctl kubernetes cluster kubeconfig save auction-cluster

      - name: Deploy to Kubernetes
        run: |
          # 1. Ensure app-secrets exists (create or update from GitHub Secrets)
          kubectl delete secret app-secrets --ignore-not-found
          kubectl create secret generic app-secrets \
            --from-literal=JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --from-literal=SMTP_HOST=${{ secrets.SMTP_HOST }} \
            --from-literal=SMTP_PORT=${{ secrets.SMTP_PORT }} \
            --from-literal=SMTP_USER=${{ secrets.SMTP_USER }} \
            --from-literal=SMTP_PASS=${{ secrets.SMTP_PASS }} \
            --from-literal=EMAIL_FROM=${{ secrets.EMAIL_FROM }}

          # 2. Apply your Kubernetes architecture
          kubectl apply -f k8s-deploy.yaml -f backup-cronjob.yaml
          
          # 3. Force Kubernetes to pull the new 'latest' image we just pushed
          kubectl rollout restart deployment/api
          kubectl rollout restart deployment/worker
          
          # 4. Verify the rollout status
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/worker --timeout=120s