name: Build and Deploy to DigitalOcean Kubernetes

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (Cluster + Spaces + Monitoring Alerts)
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          ENABLE_MONITOR_ALERTS: ${{ secrets.ENABLE_MONITOR_ALERTS || 'false' }}
          CREATE_BACKUP_BUCKET: ${{ secrets.CREATE_BACKUP_BUCKET || 'false' }}
          BACKUP_BUCKET_NAME: ${{ secrets.BACKUP_BUCKET_NAME }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="spaces_access_id=${{ secrets.SPACES_ACCESS_ID }}" \
            -var="spaces_secret_key=${{ secrets.SPACES_SECRET_KEY }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -var="enable_monitor_alerts=$ENABLE_MONITOR_ALERTS" \
            -var="create_backup_bucket=$CREATE_BACKUP_BUCKET" \
            -var="backup_bucket_name=$BACKUP_BUCKET_NAME"

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/auction-api:latest

      - name: Install DigitalOcean CLI (doctl)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Save DigitalOcean Kubeconfig
        run: doctl kubernetes cluster kubeconfig save auction-cluster

      - name: Deploy to Kubernetes
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          kubectl delete secret app-secrets --ignore-not-found
          kubectl create secret generic app-secrets \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=RESEND_API_KEY="$RESEND_API_KEY" \
            --from-literal=EMAIL_FROM="$EMAIL_FROM"

          kubectl apply -f k8s-deploy.yaml -f backup-cronjob.yaml

          kubectl exec -i postgres-0 -- psql -U postgres -d auctiondb < init.sql || echo "Warning: init.sql application had issues, check logs"
          kubectl rollout restart deployment/api
          kubectl rollout restart deployment/worker
          kubectl rollout status deployment/api --timeout=300s
          kubectl rollout status deployment/worker --timeout=300s
