apiVersion: batch/v1
kind: Job
metadata:
  name: db-restore-latest
spec:
  template:
    spec:
      containers:
      - name: restore
        image: alpine:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Installing tools..."
          apk add --no-cache postgresql-client aws-cli > /dev/null
          
          export AWS_ACCESS_KEY_ID=$SPACES_ACCESS_KEY
          export AWS_SECRET_ACCESS_KEY=$SPACES_SECRET_KEY
          
          echo "Finding the most recent backup..."
          LATEST_BACKUP=$(aws s3 ls s3://$SPACE_NAME/ --endpoint-url https://tor1.digitaloceanspaces.com | sort | tail -n 1 | awk '{print $4}')
          
          if [ -z "$LATEST_BACKUP" ]; then
            echo "Error: No backup files found in the bucket!"
            exit 1
          fi
          
          echo "Downloading $LATEST_BACKUP..."
          aws s3 cp s3://$SPACE_NAME/$LATEST_BACKUP /tmp/latest.sql --endpoint-url https://tor1.digitaloceanspaces.com
          
          echo "Wiping current database schema..."
          export PGPASSWORD=$POSTGRES_PASSWORD
          psql -h postgres-0.postgres.default.svc.cluster.local -U $POSTGRES_USER -d $POSTGRES_DB -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          
          echo "Restoring data from backup..."
          psql -h postgres-0.postgres.default.svc.cluster.local -U $POSTGRES_USER -d $POSTGRES_DB < /tmp/latest.sql
          
          echo "Restore completely successfully!"
        env:
        - name: SPACES_ACCESS_KEY
          valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACES_ACCESS_KEY } }
        - name: SPACES_SECRET_KEY
          valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACES_SECRET_KEY } }
        - name: SPACE_NAME
          valueFrom: { secretKeyRef: { name: backup-secrets, key: SPACE_NAME } }
        - name: POSTGRES_USER
          valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_USER } }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_PASSWORD } }
        - name: POSTGRES_DB
          valueFrom: { secretKeyRef: { name: db-secrets, key: POSTGRES_DB } }
      restartPolicy: Never
  backoffLimit: 0